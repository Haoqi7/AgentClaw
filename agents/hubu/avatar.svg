<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffbe90"/>
      <stop offset="100%" stop-color="#d06020"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe680"/>
      <stop offset="50%" stop-color="#f0c040"/>
      <stop offset="100%" stop-color="#d0a020"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <circle cx="32" cy="32" r="31" fill="url(#bg)" stroke="#a04810" stroke-width="1"/>
  <circle cx="32" cy="32" r="28" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
  <!-- Traditional Chinese coin + abacus -->
  <g filter="url(#shadow)" transform="translate(30,30)">
    <!-- Outer coin ring -->
    <circle cx="0" cy="0" r="20" fill="url(#gold)" stroke="#a07820" stroke-width="1.5"/>
    <!-- Inner coin ring -->
    <circle cx="0" cy="0" r="16" fill="none" stroke="#a07820" stroke-width="1"/>
    <!-- Raised rim texture -->
    <circle cx="0" cy="0" r="18" fill="none" stroke="#fff" stroke-width="0.3" opacity="0.5"/>
    <!-- Square hole -->
    <rect x="-4" y="-4" width="8" height="8" fill="url(#bg)" stroke="#a07820" stroke-width="1.5"/>
    <!-- Coin characters (simplified "开元通宝" style marks) -->
    <path d="M-8,-10 Q-8,-14 -4,-14" fill="none" stroke="#a07820" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M8,-10 Q8,-14 4,-14" fill="none" stroke="#a07820" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M-8,10 Q-8,14 -4,14" fill="none" stroke="#a07820" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M8,10 Q8,14 4,14" fill="none" stroke="#a07820" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Abacus beads floating around -->
    <circle cx="22" cy="-10" r="4" fill="#d05020" stroke="#a03010" stroke-width="0.8"/>
    <line x1="22" y1="-14" x2="22" y2="-6" stroke="#a03010" stroke-width="0.6"/>
    <circle cx="22" cy="10" r="4" fill="#e06030" stroke="#a03010" stroke-width="0.8"/>
    <line x1="22" y1="6" x2="22" y2="14" stroke="#a03010" stroke-width="0.6"/>
  </g>
</svg>
