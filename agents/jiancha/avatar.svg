<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f06060"/>
      <stop offset="100%" stop-color="#a01818"/>
    </radialGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="40%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#d8dce0"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe680"/>
      <stop offset="100%" stop-color="#c09020"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="32" cy="32" r="31" fill="url(#bg)" stroke="#701010" stroke-width="1"/>
  <circle cx="32" cy="32" r="28" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
  <!-- Shield with censor eye -->
  <g filter="url(#shadow)" transform="translate(32,30)">
    <!-- Shield shape -->
    <path d="M0,-22 L18,-14 L18,4 C18,16 0,24 0,24 C0,24 -18,16 -18,4 L-18,-14 Z" fill="url(#shield)" stroke="url(#rim)" stroke-width="2"/>
    <!-- Inner shield border -->
    <path d="M0,-17 L14,-10 L14,2 C14,12 0,19 0,19 C0,19 -14,12 -14,2 L-14,-10 Z" fill="none" stroke="#c09020" stroke-width="0.8" stroke-dasharray="3,2"/>
    <!-- Central eye (all-seeing censor) -->
    <g filter="url(#glow)">
      <!-- Eye shape -->
      <path d="M-12,0 Q0,-10 12,0 Q0,10 -12,0 Z" fill="none" stroke="#a01818" stroke-width="1.5"/>
      <!-- Iris -->
      <circle cx="0" cy="0" r="5" fill="#a01818" opacity="0.8"/>
      <!-- Pupil -->
      <circle cx="0" cy="0" r="2.5" fill="#300808"/>
      <!-- Eye highlight -->
      <circle cx="-1.5" cy="-1.5" r="1.2" fill="#fff" opacity="0.8"/>
    </g>
    <!-- Crossed lines below eye (authority) -->
    <line x1="-6" y1="8" x2="6" y2="8" stroke="#a01818" stroke-width="1.2" opacity="0.5"/>
    <line x1="-4" y1="11" x2="4" y2="11" stroke="#a01818" stroke-width="1.2" opacity="0.5"/>
  </g>
</svg>
