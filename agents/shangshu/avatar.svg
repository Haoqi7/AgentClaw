<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#80ffa8"/>
      <stop offset="100%" stop-color="#30a060"/>
    </radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="50%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#c0c0c0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <circle cx="32" cy="32" r="31" fill="url(#bg)" stroke="#208040" stroke-width="1"/>
  <circle cx="32" cy="32" r="28" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
  <!-- Command token / dispatch arrow -->
  <g filter="url(#shadow)" transform="translate(32,32)">
    <!-- Token plaque -->
    <rect x="-14" y="-16" width="28" height="32" rx="3" fill="url(#metal)" stroke="#888" stroke-width="1"/>
    <!-- Inner border -->
    <rect x="-11" y="-13" width="22" height="26" rx="1.5" fill="none" stroke="#30a060" stroke-width="1" stroke-dasharray="2,1"/>
    <!-- Character "令" (simplified) -->
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#30a060" stroke-width="2.2"/>
    <line x1="-8" y1="-4" x2="8" y2="-4" stroke="#30a060" stroke-width="2.2"/>
    <path d="M-2,4 Q-6,8 -8,11" fill="none" stroke="#30a060" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M2,4 Q6,8 8,11" fill="none" stroke="#30a060" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Hole at top -->
    <circle cx="0" cy="-16" r="2.5" fill="#40b068" stroke="#208040" stroke-width="1"/>
    <!-- Tassel -->
    <path d="M0,-13.5 Q0,-10 -3,-9" fill="none" stroke="#c0392b" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="-3" cy="-9" r="1.2" fill="#e74c3c"/>
    <path d="M0,-13.5 Q0,-10 3,-9" fill="none" stroke="#c0392b" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="3" cy="-9" r="1.2" fill="#e74c3c"/>
  </g>
</svg>
