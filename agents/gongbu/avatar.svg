<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#70c0ff"/>
      <stop offset="100%" stop-color="#2080c0"/>
    </radialGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d0d8e0"/>
      <stop offset="50%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#a0a8b0"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0784c"/>
      <stop offset="100%" stop-color="#6b4c2a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <circle cx="32" cy="32" r="31" fill="url(#bg)" stroke="#1060a0" stroke-width="1"/>
  <circle cx="32" cy="32" r="28" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
  <!-- Wrench + Gear (DevOps) -->
  <g filter="url(#shadow)" transform="translate(32,32)">
    <!-- Large gear -->
    <circle cx="-8" cy="-6" r="12" fill="url(#steel)" stroke="#607080" stroke-width="1"/>
    <circle cx="-8" cy="-6" r="7" fill="url(#bg)" stroke="#607080" stroke-width="0.8"/>
    <circle cx="-8" cy="-6" r="3" fill="url(#steel)" stroke="#607080" stroke-width="0.5"/>
    <!-- Gear teeth -->
    <rect x="-10" y="-20" width="4" height="5" rx="0.5" fill="url(#steel)" stroke="#607080" stroke-width="0.5"/>
    <rect x="-10" y="3" width="4" height="5" rx="0.5" fill="url(#steel)" stroke="#607080" stroke-width="0.5"/>
    <rect x="-22" y="-8" width="5" height="4" rx="0.5" fill="url(#steel)" stroke="#607080" stroke-width="0.5"/>
    <rect x="5" y="-8" width="5" height="4" rx="0.5" fill="url(#steel)" stroke="#607080" stroke-width="0.5"/>
    <rect x="1" y="-17" width="4.5" height="4" rx="0.5" fill="url(#steel)" stroke="#607080" stroke-width="0.5" transform="rotate(45 3.25 -15)"/>
    <rect x="-19" y="2" width="4.5" height="4" rx="0.5" fill="url(#steel)" stroke="#607080" stroke-width="0.5" transform="rotate(45 -16.75 4)"/>
    <rect x="-19" y="-16" width="4.5" height="4" rx="0.5" fill="url(#steel)" stroke="#607080" stroke-width="0.5" transform="rotate(-45 -16.75 -14)"/>
    <rect x="1" y="2" width="4.5" height="4" rx="0.5" fill="url(#steel)" stroke="#607080" stroke-width="0.5" transform="rotate(-45 3.25 4)"/>
    <!-- Wrench -->
    <g transform="rotate(35 10 14)">
      <path d="M2,4 L10,12 L14,8 L6,0 Z" fill="url(#steel)" stroke="#607080" stroke-width="0.8"/>
      <path d="M-2,0 L6,0 L6,4 L-2,4 Z" fill="url(#steel)" stroke="#607080" stroke-width="0.8"/>
      <!-- Wrench head opening -->
      <path d="M-2,0 L0,-3 L2,0" fill="url(#bg)" stroke="#607080" stroke-width="0.8"/>
      <path d="M-2,4 L0,7 L2,4" fill="url(#bg)" stroke="#607080" stroke-width="0.8"/>
      <!-- Handle -->
      <rect x="10" y="10" width="10" height="4" rx="1" fill="url(#wood)" stroke="#5a3c1a" stroke-width="0.6"/>
    </g>
  </g>
</svg>
