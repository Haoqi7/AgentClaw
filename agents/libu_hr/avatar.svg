<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#c07ae0"/>
      <stop offset="100%" stop-color="#7030a0"/>
    </radialGradient>
    <linearGradient id="hat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe680"/>
      <stop offset="100%" stop-color="#d4a030"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0.5" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <circle cx="32" cy="32" r="31" fill="url(#bg)" stroke="#502080" stroke-width="1"/>
  <circle cx="32" cy="32" r="28" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
  <!-- Wusha hat (乌纱帽) + Official seal -->
  <g filter="url(#shadow)" transform="translate(32,30)">
    <!-- Hat wings (the iconic flaps) -->
    <path d="M-8,16 Q-18,12 -28,8" fill="none" stroke="url(#hat)" stroke-width="3" stroke-linecap="round"/>
    <path d="M8,16 Q18,12 28,8" fill="none" stroke="url(#hat)" stroke-width="3" stroke-linecap="round"/>
    <!-- Wing tips -->
    <circle cx="-28" cy="8" r="2.5" fill="url(#gold)" stroke="#a07820" stroke-width="0.5"/>
    <circle cx="28" cy="8" r="2.5" fill="url(#gold)" stroke="#a07820" stroke-width="0.5"/>
    <!-- Hat body -->
    <path d="M-14,14 L-10,-4 Q0,-12 10,-4 L14,14 Z" fill="url(#hat)" stroke="#333" stroke-width="0.8"/>
    <!-- Hat brim -->
    <path d="M-16,14 Q0,20 16,14" fill="none" stroke="#333" stroke-width="2.5"/>
    <path d="M-16,14 Q0,22 16,14" fill="none" stroke="#222" stroke-width="0.5" opacity="0.3"/>
    <!-- Gold band -->
    <path d="M-14,14 Q0,18 14,14" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <!-- Top jewel -->
    <circle cx="0" cy="-6" r="3.5" fill="url(#gold)" stroke="#a07820" stroke-width="0.8"/>
    <circle cx="0" cy="-6" r="1.5" fill="#c0392b"/>
    <!-- Hat seam lines -->
    <line x1="0" y1="-10" x2="0" y2="12" stroke="#333" stroke-width="0.5" opacity="0.4"/>
    <!-- Small seal at bottom -->
    <rect x="-5" y="20" width="10" height="8" rx="1" fill="#c0392b" stroke="#8b1a1a" stroke-width="0.8"/>
    <line x1="-2" y1="23" x2="2" y2="23" stroke="#fff" stroke-width="0.8" opacity="0.6"/>
    <line x1="-3" y1="25.5" x2="3" y2="25.5" stroke="#fff" stroke-width="0.8" opacity="0.6"/>
  </g>
</svg>
