<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#e06060"/>
      <stop offset="100%" stop-color="#8b1a1a"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe680"/>
      <stop offset="100%" stop-color="#d4a030"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <circle cx="32" cy="32" r="31" fill="url(#bg)" stroke="#601010" stroke-width="1"/>
  <circle cx="32" cy="32" r="28" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
  <!-- Traditional Chinese balance scale (权衡) -->
  <g filter="url(#shadow)" transform="translate(32,32)">
    <!-- Central pillar -->
    <rect x="-1.5" y="-4" width="3" height="30" rx="1" fill="url(#gold)" stroke="#a07820" stroke-width="0.5"/>
    <!-- Base -->
    <path d="M-12,26 Q-12,22 0,22 Q12,22 12,26 Z" fill="url(#gold)" stroke="#a07820" stroke-width="0.8"/>
    <!-- Top ornament -->
    <circle cx="0" cy="-6" r="3" fill="#ffe080" stroke="#a07820" stroke-width="1"/>
    <circle cx="0" cy="-6" r="1" fill="#c0392b"/>
    <!-- Beam -->
    <line x1="-20" y1="-2" x2="20" y2="-2" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Left chain -->
    <line x1="-20" y1="-2" x2="-20" y2="8" stroke="#ffe080" stroke-width="1"/>
    <line x1="-16" y1="-2" x2="-16" y2="8" stroke="#ffe080" stroke-width="1"/>
    <!-- Left pan -->
    <path d="M-24,8 Q-20,12 -16,8" fill="none" stroke="#ffe080" stroke-width="1.5"/>
    <ellipse cx="-20" cy="10" rx="7" ry="2.5" fill="url(#gold)" stroke="#a07820" stroke-width="0.8"/>
    <!-- Right chain -->
    <line x1="16" y1="-2" x2="16" y2="5" stroke="#ffe080" stroke-width="1"/>
    <line x1="20" y1="-2" x2="20" y2="5" stroke="#ffe080" stroke-width="1"/>
    <!-- Right pan (tilted - heavier) -->
    <path d="M12,5 Q16,9 20,5" fill="none" stroke="#ffe080" stroke-width="1.5"/>
    <ellipse cx="16" cy="7" rx="7" ry="2.5" fill="url(#gold)" stroke="#a07820" stroke-width="0.8"/>
    <!-- Weight on right pan -->
    <rect x="13" y="4" width="6" height="4" rx="1" fill="#c0392b" stroke="#8b1a1a" stroke-width="0.6"/>
    <!-- Scale markings on beam -->
    <line x1="-10" y1="-3" x2="-10" y2="-1" stroke="#a07820" stroke-width="0.8"/>
    <line x1="0" y1="-3.5" x2="0" y2="-0.5" stroke="#a07820" stroke-width="0.8"/>
    <line x1="10" y1="-3" x2="10" y2="-1" stroke="#a07820" stroke-width="0.8"/>
  </g>
</svg>
