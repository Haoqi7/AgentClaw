<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffe070"/>
      <stop offset="100%" stop-color="#c0a020"/>
    </radialGradient>
    <linearGradient id="bamboo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8dcc0"/>
      <stop offset="50%" stop-color="#f8f0e0"/>
      <stop offset="100%" stop-color="#d8ccaa"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0.5" dy="1" stdDeviation="0.8" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <circle cx="32" cy="32" r="31" fill="url(#bg)" stroke="#907818" stroke-width="1"/>
  <circle cx="32" cy="32" r="28" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
  <!-- Bamboo slip book -->
  <g filter="url(#shadow)" transform="translate(32,32)">
    <!-- Individual bamboo strips -->
    <rect x="-15" y="-18" width="3.5" height="36" rx="1" fill="url(#bamboo)" stroke="#b8a878" stroke-width="0.6"/>
    <rect x="-10.5" y="-18" width="3.5" height="36" rx="1" fill="url(#bamboo)" stroke="#b8a878" stroke-width="0.6"/>
    <rect x="-6" y="-18" width="3.5" height="36" rx="1" fill="url(#bamboo)" stroke="#b8a878" stroke-width="0.6"/>
    <rect x="-1.5" y="-18" width="3.5" height="36" rx="1" fill="url(#bamboo)" stroke="#b8a878" stroke-width="0.6"/>
    <rect x="3" y="-18" width="3.5" height="36" rx="1" fill="url(#bamboo)" stroke="#b8a878" stroke-width="0.6"/>
    <rect x="7.5" y="-18" width="3.5" height="36" rx="1" fill="url(#bamboo)" stroke="#b8a878" stroke-width="0.6"/>
    <rect x="12" y="-18" width="3.5" height="36" rx="1" fill="url(#bamboo)" stroke="#b8a878" stroke-width="0.6"/>
    <!-- Binding cords -->
    <line x1="-17" y1="-14" x2="17" y2="-14" stroke="#8b6914" stroke-width="1.8"/>
    <line x1="-17" y1="14" x2="17" y2="14" stroke="#8b6914" stroke-width="1.8"/>
    <!-- Binding knots -->
    <circle cx="-17" cy="-14" r="2" fill="#a07818" stroke="#705010" stroke-width="0.5"/>
    <circle cx="17" cy="-14" r="2" fill="#a07818" stroke="#705010" stroke-width="0.5"/>
    <circle cx="-17" cy="14" r="2" fill="#a07818" stroke="#705010" stroke-width="0.5"/>
    <circle cx="17" cy="14" r="2" fill="#a07818" stroke="#705010" stroke-width="0.5"/>
    <!-- Text on bamboo -->
    <line x1="-12" y1="-7" x2="12" y2="-7" stroke="#6b5010" stroke-width="1" stroke-linecap="round"/>
    <line x1="-12" y1="-2" x2="12" y2="-2" stroke="#6b5010" stroke-width="1" stroke-linecap="round"/>
    <line x1="-12" y1="3" x2="8" y2="3" stroke="#6b5010" stroke-width="1" stroke-linecap="round"/>
    <line x1="-12" y1="8" x2="10" y2="8" stroke="#6b5010" stroke-width="1" stroke-linecap="round"/>
  </g>
</svg>
