version: "3.9"

services:
  agentclaw:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: agentclaw-all-in-one
    ports:
      - "7891:7891"
      - "18789:18789"
    environment:
      - TZ=Asia/Shanghai
      - EDICT_DASHBOARD_PORT=7891
      # ── Fix #5/#6: Docker 部署外部 URL 配置 ──
      # EDICT_EXTERNAL_URL: 看板外部访问地址（浏览器可访问的地址），不设置则自动从请求 Host 头推断
      # 示例: EDICT_EXTERNAL_URL=http://192.168.1.100:7891
      # - EDICT_EXTERNAL_URL=http://YOUR_SERVER_IP:7891
      # EDICT_EXTERNAL_GATEWAY_URL: Gateway 外部访问地址（可选，不设置则基于 EDICT_EXTERNAL_URL 或 Host 头推断）
      # 示例: EDICT_EXTERNAL_GATEWAY_URL=http://192.168.1.100:18789
      # - EDICT_EXTERNAL_GATEWAY_URL=http://YOUR_SERVER_IP:18789
      # EDICT_CORS_ORIGINS: 额外允许的 CORS Origin（逗号分隔，可选）
      # 示例: EDICT_CORS_ORIGINS=http://192.168.1.100:7891,http://myhost:8080
      # - EDICT_CORS_ORIGINS=
    volumes:
      - ../data:/app/AgentClaw/data          # 看板任务数据（必须挂载，更新镜像后否则数据丢失）
      - ../logs:/app/AgentClaw/logs           # 运行日志
      - ../openclaw-home:/root/.openclaw      # OpenClaw 主目录（配置、产出文件、Agent工作空间）
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:7891/ && curl -f http://127.0.0.1:18789/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped
