
name: Build and Release Docker Image (Manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0). If empty, auto-generate."
        required: false
        default: ""
      image_name:
        description: "Image name (without owner)."
        required: false
        default: "openclaw"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    env:
      DEFAULT_IMAGE_NAME: openclaw
      MAX_ASSET_SIZE: 2147483648

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          INPUT_TAG="${{ github.event.inputs.tag }}"
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="v$(date +'%Y.%m.%d')-${GITHUB_RUN_NUMBER}"
          fi

          IMAGE_NAME="${{ github.event.inputs.image_name }}"
          if [ -z "$IMAGE_NAME" ]; then
            IMAGE_NAME="${DEFAULT_IMAGE_NAME}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          
      - name: Set up QEMU       
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Build single-arch docker archive for GitHub Release
      - name: Build amd64 docker archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          docker buildx build \
            --platform linux/amd64 \
            -f docker/Dockerfile \
            -t "${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.tag }}-amd64" \
            --output type=docker,dest=out/${{ steps.meta.outputs.image_name }}-${{ steps.meta.outputs.tag }}-amd64.docker.tar \
            .

      # Build and push multi-arch image to Docker Hub
      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            haoqi7/${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.tag }}
            haoqi7/${{ steps.meta.outputs.image_name }}:latest

      - name: Install zstd
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y zstd

      - name: Normalize artifacts for GitHub Release size limit
        id: normalize
        shell: bash
        run: |
          set -euo pipefail
          cd out
          shopt -s nullglob

          RELEASE_FILES=()

          process_file () {
            local f="$1"
            local size
            size=$(stat -c%s "$f")
            echo "Processing $f ($size bytes)"

            if [ "$size" -lt "${MAX_ASSET_SIZE}" ]; then
              RELEASE_FILES+=("$f")
              return
            fi

            echo "File >= 2GB, compressing with zstd: $f"
            zstd -19 -T0 "$f" -o "${f}.zst"
            rm -f "$f"

            local zf="${f}.zst"
            local zsize
            zsize=$(stat -c%s "$zf")
            echo "Compressed $zf ($zsize bytes)"

            if [ "$zsize" -lt "${MAX_ASSET_SIZE}" ]; then
              RELEASE_FILES+=("$zf")
              return
            fi

            echo "Still >= 2GB, splitting into 1900MB parts: $zf"
            split -b 1900m -d -a 3 "$zf" "${zf}.part."
            rm -f "$zf"

            for p in ${zf}.part.*; do
              RELEASE_FILES+=("$p")
            done
          }

          for f in *.tar; do
            process_file "$f"
          done

          cat > RESTORE.md <<'EOF'
          # Restore Docker Images

          ## 1) If you downloaded a single `.tar`
          ```bash
          docker load -i <file>.tar
          ```

          ## 2) If you downloaded a `.tar.zst`
          ```bash
          zstd -d <file>.tar.zst
          docker load -i <file>.tar
          ```

          ## 3) If you downloaded split parts (`.part.000`, `.part.001`, ...)
          ```bash
          cat <file>.zst.part.* > merged.tar.zst
          zstd -d merged.tar.zst -o merged.tar
          docker load -i merged.tar
          ```
          EOF

          RELEASE_FILES+=("RESTORE.md")
          sha256sum "${RELEASE_FILES[@]}" > SHA256SUMS.txt
          RELEASE_FILES+=("SHA256SUMS.txt")

          {
            echo "files<<EOF"
            for f in "${RELEASE_FILES[@]}"; do
              echo "out/$f"
            done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create/Update GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Release ${{ steps.meta.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ steps.normalize.outputs.files }}
