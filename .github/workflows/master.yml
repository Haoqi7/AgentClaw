name:  Release and Docker HUB

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0). If empty, auto-generate."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve metadata
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="v$(date +'%Y.%m.%d')-${GITHUB_RUN_NUMBER}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 构建并推送多架构镜像到 Docker Hub
      - name: Build and push multi-arch to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            haoqi7/openclaw:${{ steps.meta.outputs.tag }}
            haoqi7/openclaw:latest

      # 导出 amd64 tar 文件（用于 GitHub Release）
      - name: Export amd64 image to tar
        run: |
          mkdir -p out
          docker buildx build \
            --platform linux/amd64 \
            -f docker/Dockerfile \
            -t haoqi7/openclaw:${{ steps.meta.outputs.tag }} \
            --output type=docker,dest=out/openclaw-${{ steps.meta.outputs.tag }}.tar \
            .

      # 创建 GitHub Release 并上传
      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Release ${{ steps.meta.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: out/*
