name: Build and Push to Docker Hub & Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0). If empty, auto-generate."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="v$(date +'%Y.%m.%d')-${GITHUB_RUN_NUMBER}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 一次构建，同时完成：推送到 Docker Hub + 导出到本地文件
      - name: Build, push and export
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          outputs: |
            type=image,name=haoqi7/openclaw,push-by-digest=true
            type=docker,dest=out/openclaw-${{ steps.meta.outputs.tag }}.docker.tar
          tags: |
            haoqi7/openclaw:${{ steps.meta.outputs.tag }}
            haoqi7/openclaw:latest

      - name: Compress Docker image (if needed)
        shell: bash
        run: |
          cd out
          size=$(stat -c%s *.tar)
          if [ "$size" -gt 2000000000 ]; then
            echo "File > 2GB, compressing..."
            zstd -19 -T0 *.tar -o openclaw-${{ steps.meta.outputs.tag }}.docker.tar.zst
            rm *.tar
          fi

      - name: Create GitHub Release and upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Release ${{ steps.meta.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: out/*

      - name: Upload to GitHub Release (alternative)
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: out/
